<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Airgent</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar">
        <div class="sidebar-top">
          <h1>
            <a
              class="sidebar-title-link"
              href="https://github.com/Holidayrabbit/Airgent?tab=readme-ov-file"
              target="_blank"
              rel="noreferrer"
              aria-label="Open Airgent repository on GitHub"
              title="Open Airgent repository on GitHub"
            >
              Airgent
            </a>
          </h1>
        </div>

        <div class="sidebar-sections">
          <section class="sidebar-section sidebar-section-grow">
            <div class="section-head">
              <h2>Sessions</h2>
              <button id="refresh-sessions-button" class="ghost-button" type="button">Refresh</button>
            </div>
            <div id="sessions-list" class="session-list"></div>
          </section>

          <section class="sidebar-section memory-section">
            <div class="section-head">
              <h2>Memory</h2>
              <button id="refresh-memory-button" class="ghost-button" type="button">Refresh</button>
            </div>
            <div id="memory-list" class="stack memory-list"></div>
          </section>
        </div>
      </aside>

      <main class="chat-pane">
        <div class="chat-header">
          <div>
            <p class="eyebrow">Session</p>
            <h2 id="session-title">New chat</h2>
          </div>
          <div class="chat-header-actions">
            <label class="agent-picker" for="agent-select">
              <span>Agent</span>
              <select id="agent-select" name="agent"></select>
            </label>
            <button id="new-chat-button" class="secondary-button" type="button">New Chat</button>
          </div>
        </div>

        <section class="thread-panel">
          <div class="thread-header">
            <p class="eyebrow">Thread</p>
          </div>
          <div id="messages" class="messages"></div>
        </section>

        <form id="composer" class="composer">
          <textarea
            id="message-input"
            name="message"
            rows="3"
            placeholder="Ask Airgent anything..."
          ></textarea>
          <div class="composer-actions">
            <button id="send-button" class="primary-button composer-send" type="submit" aria-label="Send message">&uarr;</button>
          </div>
        </form>
      </main>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
  </html>
