<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Airgent</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar">
        <div class="sidebar-top">
          <h1>Airgent</h1>
          <p class="sidebar-copy">
            Developer:
            <a href="https://github.com/Holidayrabbit" target="_blank" rel="noreferrer">Fulin Zhao</a>
            <br />
            Repository:
            <a
              href="https://github.com/Holidayrabbit/Airgent?tab=readme-ov-file"
              target="_blank"
              rel="noreferrer"
            >
              github.com/Holidayrabbit/Airgent
            </a>
          </p>
        </div>
        <button id="new-chat-button" class="secondary-button" type="button">New Chat</button>

        <div class="sidebar-sections">
          <section class="sidebar-section sidebar-section-grow">
            <div class="section-head">
              <h2>Sessions</h2>
              <button id="refresh-sessions-button" class="ghost-button" type="button">Refresh</button>
            </div>
            <div id="sessions-list" class="session-list"></div>
          </section>

          <section class="sidebar-section memory-section">
            <div class="section-head">
              <h2>Memory</h2>
              <button id="refresh-memory-button" class="ghost-button" type="button">Refresh</button>
            </div>
            <div id="memory-list" class="stack memory-list"></div>
          </section>
        </div>
      </aside>

      <main class="chat-pane">
        <div class="chat-header">
          <div>
            <p class="eyebrow">Session</p>
            <h2 id="session-title">New chat</h2>
          </div>
          <div id="session-badge" class="session-badge">No session yet</div>
        </div>

        <section class="thread-panel">
          <div class="thread-header">
            <p class="eyebrow">Thread</p>
          </div>
          <div id="messages" class="messages"></div>
        </section>

        <form id="composer" class="composer">
          <textarea
            id="message-input"
            name="message"
            rows="4"
            placeholder="Ask Airgent anything..."
          ></textarea>
          <div class="composer-actions">
            <p id="status-line" class="status-line">Ready</p>
            <button id="send-button" class="primary-button" type="submit">Send</button>
          </div>
        </form>
      </main>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
  </html>
